<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐷 팔용이의 저금통</title>
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@300;400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
/* 기존의 예쁜 스타일 모두 복구 */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --pink-light:#fce4ec; --pink:#f48fb1; --pink-mid:#e91e8c; --pink-deep:#c2185b; --pink-bg:#fff0f5;
  --gold:#f59e0b; --gold-light:#fef3c7; --text:#3d1a2e; --text-muted:#9e6b7e; --white:#ffffff; --shadow:rgba(244,143,177,0.35);
}
body{ font-family:'Noto Sans KR',sans-serif; background:var(--pink-bg); min-height:100vh; color:var(--text); overflow-x:hidden; }
.bg-coins{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.bg-coin{position:absolute;font-size:20px;opacity:0.08;animation:coinFloat linear infinite;}
@keyframes coinFloat{0%{transform:translateY(110vh) rotate(0deg)} 100%{transform:translateY(-10vh) rotate(720deg)}}
.page{position:relative;z-index:1;max-width:680px;margin:0 auto;padding:24px 20px 80px}
.header{text-align:center;padding:40px 0 20px;}
.header h1{font-family:'Gaegu',cursive;font-size:clamp(26px,6vw,38px);line-height:1.3;margin-bottom:6px;}
.progress-card{background:#fff;border-radius:24px;padding:24px;margin:20px 0;box-shadow:0 8px 32px var(--shadow);}
.total-display .amount{font-family:'Gaegu',cursive;font-size:clamp(32px,8vw,52px);font-weight:700;color:var(--pink-deep);text-align:center}
.progress-track{background:#fce4ec;border-radius:99px;height:22px;overflow:hidden;margin:8px 0 6px;}
.progress-fill{height:100%;background:linear-gradient(90deg,#f48fb1,#e91e8c,#c2185b);transition:width 0.5s ease;}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:16px}
.stat-box{background:var(--pink-bg);border-radius:14px;padding:12px 8px;text-align:center;border:1.5px solid #fce4ec;}
.stat-box .sv{font-size:16px;font-weight:700;color:var(--pink-deep);font-family:'Gaegu',cursive}
.name-screen{background:#fff;border-radius:24px;padding:32px 24px;text-align:center;}
.name-input-row{display:flex;gap:10px;max-width:320px;margin:0 auto}
.name-input-row input{flex:1;padding:12px 16px;border:2px solid #fce4ec;border-radius:14px;outline:none;}
.btn-start{padding:12px 20px;background:var(--pink-deep);color:#fff;border:none;border-radius:14px;font-weight:700;cursor:pointer;}
.pig-section{background:#fff;border-radius:24px;padding:28px 20px 20px;text-align:center;position:relative;overflow:hidden;}
#pig-canvas{display:block;margin:0 auto}
.donate-btn{padding:16px 48px;background:linear-gradient(135deg,#e91e8c,#c2185b);color:#fff;font-size:20px;border:none;border-radius:99px;cursor:pointer;font-family:'Gaegu',cursive;}
.tabs{display:flex;gap:8px;margin:20px 0 12px}
.tab-btn{flex:1;padding:10px;border-radius:14px;border:2px solid #fce4ec;background:#fff;cursor:pointer;font-weight:700;color:var(--text-muted);}
.tab-btn.active{background:var(--pink-deep);color:#fff;border-color:var(--pink-deep)}
.section-card{background:#fff;border-radius:24px;padding:20px;margin-bottom:16px;}
.rank-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--pink-bg);border-radius:14px;margin-bottom:6px;}
.gb-item{padding:12px;background:var(--pink-bg);border-radius:14px;margin-bottom:8px;}
.gb-input-row{display:flex;gap:8px}
.gb-input-row input{flex:1;padding:11px 14px;border:2px solid #fce4ec;border-radius:14px;outline:none;}
.gb-submit{padding:11px 18px;background:var(--pink-deep);color:#fff;border:none;border-radius:14px;cursor:pointer;}
.coin-insert{position:absolute;top:10px;left:50%;transform:translateX(-50%);font-size:22px;animation:coinDrop 0.6s ease-in forwards;pointer-events:none;z-index:10;}
@keyframes coinDrop{0%{opacity:1;transform:translateY(-10px) rotate(0deg)} 100%{opacity:0;transform:translateY(70px) rotate(360deg)}}
</style>
</head>
<body>

<div class="bg-coins" id="bg-coins"></div>
<div class="page">
  <div class="header">
    <h1>함께 키우는<br>팔용이의 저금통</h1>
  </div>

  <div class="progress-card">
    <div class="total-display">
      <div class="amount" id="total-amount">0원</div>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="stats-row">
      <div class="stat-box"><div class="sv" id="s-total">0원</div><div style="font-size:11px">총액</div></div>
      <div class="stat-box"><div class="sv" id="s-users">0명</div><div style="font-size:11px">참여자</div></div>
      <div class="stat-box"><div class="sv" id="s-my">0원</div><div style="font-size:11px">내 기부</div></div>
    </div>
  </div>

  <div id="name-screen" class="name-screen">
    <p style="margin-bottom:20px">닉네임을 입력하고 저금통을 채워봐요! 🪙</p>
    <div class="name-input-row">
      <input type="text" id="name-input" placeholder="닉네임" maxlength="10">
      <button class="btn-start" onclick="startUser()">시작!</button>
    </div>
  </div>

  <div id="main-screen" style="display:none">
    <div class="pig-section">
      <div id="pig-wrap"><canvas id="pig-canvas" width="300" height="280"></canvas></div>
      <div id="stage-label" style="font-family:'Gaegu';font-size:18px;color:var(--pink-deep);margin:10px 0">🐷 저금통을 채워주세요!</div>
      <button class="donate-btn" onclick="donate()">🪙 1원 넣기!</button>
    </div>

    <div class="tabs">
      <button class="tab-btn active" id="tab-rank-btn" onclick="showTab('rank')">🏆 랭킹</button>
      <button class="tab-btn" id="tab-gb-btn" onclick="showTab('gb')">📝 방명록</button>
    </div>

    <div id="panel-rank" class="section-card">
      <ul id="rank-list"></ul>
    </div>

    <div id="panel-gb" class="section-card" style="display:none">
      <div id="gb-list" style="max-height:200px;overflow-y:auto;margin-bottom:10px"></div>
      <div class="gb-input-row">
        <input type="text" id="gb-input" placeholder="메시지 입력" maxlength="50">
        <button class="gb-submit" onclick="postGB()">남기기</button>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, set, onValue, push, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA3fwwoE2gGbjb6u8xXTiU2n6RycauaH10",
    authDomain: "jaei-500cb.firebaseapp.com",
    databaseURL: "https://jaei-500cb-default-rtdb.firebaseio.com/",
    projectId: "jaei-500cb",
    storageBucket: "jaei-500cb.firebasestorage.app",
    messagingSenderId: "128903883387",
    appId: "1:128903883387:web:00343264ae332f53d910de"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const GOAL = 10000000;

  let myId = localStorage.getItem('pig_id') || 'u_' + Math.random().toString(36).substr(2, 9);
  localStorage.setItem('pig_id', myId);
  let myName = localStorage.getItem('pig_name') || '';

  onValue(ref(db, '/'), (snapshot) => {
    const data = snapshot.val() || { total: 0, users: {}, guestbook: {} };
    renderUI(data);
  });

  window.startUser = function() {
    const name = document.getElementById('name-input').value.trim();
    if(!name) return;
    myName = name;
    localStorage.setItem('pig_name', myName);
    update(ref(db, 'users/' + myId), { name: myName });
    document.getElementById('name-screen').style.display = 'none';
    document.getElementById('main-screen').style.display = 'block';
  };

  window.donate = function() {
    if(!myName) return;
    const currentTotal = parseInt(document.getElementById('total-amount').textContent.replace(/[^0-9]/g, '')) || 0;
    const myCurrent = parseInt(document.getElementById('s-my').textContent.replace(/[^0-9]/g, '')) || 0;
    
    const updates = {};
    updates['total'] = currentTotal + 1;
    updates['users/' + myId + '/amount'] = myCurrent + 1;
    updates['users/' + myId + '/name'] = myName;
    update(ref(db), updates);

    const coin = document.createElement('div');
    coin.className = 'coin-insert'; coin.textContent = '🪙';
    document.getElementById('pig-wrap').appendChild(coin);
    setTimeout(() => coin.remove(), 600);
  };

  window.postGB = function() {
    const msg = document.getElementById('gb-input').value.trim();
    if(!msg) return;
    push(ref(db, 'guestbook'), { name: myName, msg, time: new Date().toLocaleString() });
    document.getElementById('gb-input').value = '';
  };

  function renderUI(data) {
    const total = data.total || 0;
    document.getElementById('total-amount').textContent = total.toLocaleString() + '원';
    document.getElementById('s-total').textContent = total.toLocaleString() + '원';
    document.getElementById('progress-fill').style.width = Math.min((total/GOAL)*100, 100) + '%';

    const users = data.users || {};
    document.getElementById('s-users').textContent = Object.keys(users).length + '명';
    const myAmt = users[myId]?.amount || 0;
    document.getElementById('s-my').textContent = myAmt.toLocaleString() + '원';

    const sortedRank = Object.values(users).sort((a,b) => (b.amount||0) - (a.amount||0)).slice(0, 10);
    document.getElementById('rank-list').innerHTML = sortedRank.map((u, i) => `
      <li class="rank-item"><span>${i+1}위</span><b style="flex:1">${u.name}</b><span>${(u.amount||0).toLocaleString()}원</span></li>
    `).join('');

    const gb = Object.values(data.guestbook || {}).reverse().slice(0, 15);
    document.getElementById('gb-list').innerHTML = gb.map(g => `
      <div class="gb-item"><div style="font-size:11px;color:#9e6b7e">${g.name}</div><div>${g.msg}</div></div>
    `).join('');

    drawPig(myAmt);
    const st = getStage(myAmt);
    document.getElementById('stage-label').textContent = st.emoji + ' ' + st.name + ' (' + myAmt.toLocaleString() + '원)';
  }

  /* 돼지 그리기 엔진 (원본 복구) */
  function getStage(amt) {
    if(amt < 100) return {name:'새 저금통', emoji:'🐷'};
    if(amt < 500) return {name:'조금 찼어', emoji:'🐷'};
    if(amt < 1000) return {name:'동전 소리 찰랑', emoji:'🐷'};
    if(amt < 5000) return {name:'배가 나왔어', emoji:'🐷'};
    if(amt < 20000) return {name:'통통해지는 중', emoji:'🐷'};
    return {name:'전설의 저금통', emoji:'💰'};
  }

  function drawPig(amount) {
    const canvas = document.getElementById('pig-canvas');
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;
    ctx.clearRect(0,0,W,H);
    const pct = Math.min(amount/10000, 1);
    const t = Date.now()/1000;
    const fat = 1 + pct * 0.75;
    const hue = 340 - pct * 20;
    const pigColor = `hsl(${hue},70%,75%)`;
    const pigDark = `hsl(${hue},70%,60%)`;
    const cx = W/2, cy = H/2 + 10;
    const bodyW = 90 * fat, bodyH = 70;
    const jiggle = Math.sin(t*2.5)*pct*3;

    ctx.fillStyle = pigColor; ctx.strokeStyle = pigDark; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.ellipse(cx, cy+jiggle, bodyW, bodyH, 0, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    // 눈
    ctx.fillStyle = '#3d1a2e'; ctx.beginPath(); ctx.arc(cx+bodyW*0.6, cy-10+jiggle, 5, 0, Math.PI*2); ctx.fill();
    // 코
    ctx.fillStyle = pigDark; ctx.beginPath(); ctx.ellipse(cx+bodyW*0.8, cy+10+jiggle, 12, 10, 0, 0, Math.PI*2); ctx.fill();
  }

  window.showTab = function(tab) {
    document.getElementById('panel-rank').style.display = tab === 'rank' ? 'block' : 'none';
    document.getElementById('panel-gb').style.display = tab === 'gb' ? 'block' : 'none';
    document.getElementById('tab-rank-btn').classList.toggle('active', tab === 'rank');
    document.getElementById('tab-gb-btn').classList.toggle('active', tab === 'gb');
  };

  setInterval(() => { if(myName) drawPig(parseInt(document.getElementById('s-my').textContent.replace(/[^0-9]/g, '')) || 0); }, 50);

  if(myName) {
    document.getElementById('name-screen').style.display = 'none';
    document.getElementById('main-screen').style.display = 'block';
  }
</script>
</body>
</html>
